# GoReleaser config. Triggered by .github/workflows/release.yml on `v*` tags.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: zanecli
    main: .
    binary: zanecli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on ARM64 is uncommon and untested — skip.
      - goos: windows
        goarch: arm64
    # ldflags inject:
    #   main.ClientVersion        — the release tag (e.g. v0.1.0)
    #   pkg/telemetry.supabaseURL — optional, from SUPABASE_URL secret
    #   pkg/telemetry.supabaseKey — optional, from SUPABASE_KEY secret
    # If a secret is empty, telemetry stays a silent no-op unless the user
    # exports SUPABASE_URL/KEY at runtime (env wins over ldflags).
    ldflags:
      - -s -w
      - -X main.ClientVersion={{.Version}}
      - -X github.com/zarakM/zanecli/pkg/telemetry.supabaseURL={{ .Env.SUPABASE_URL }}
      - -X github.com/zarakM/zanecli/pkg/telemetry.supabaseKey={{ .Env.SUPABASE_KEY }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  header: |
    ## zanecli {{ .Tag }}

    Install with:
    ```
    go install github.com/zarakM/zanecli@{{ .Tag }}
    ```

    Or download a pre-built binary below and add it to your `PATH`.
