# GoReleaser config. Triggered by .github/workflows/release.yml on `v*` tags.
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: zanecli
    main: .
    binary: zanecli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on ARM64 is uncommon and untested — skip.
      - goos: windows
        goarch: arm64
    # ldflags inject:
    #   main.ClientVersion        — the release tag (e.g. v0.1.0)
    #   pkg/telemetry.supabaseURL — optional, from SUPABASE_URL secret
    #   pkg/telemetry.supabaseKey — optional, from SUPABASE_KEY secret
    # If a secret is empty, telemetry stays a silent no-op unless the user
    # exports SUPABASE_URL/KEY at runtime (env wins over ldflags).
    ldflags:
      - -s -w
      - -X main.ClientVersion={{.Version}}
      - -X github.com/zarakM/zanecli/pkg/telemetry.supabaseURL={{ .Env.SUPABASE_URL }}
      - -X github.com/zarakM/zanecli/pkg/telemetry.supabaseKey={{ .Env.SUPABASE_KEY }}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

# Homebrew tap. GoReleaser renders a Formula/zanecli.rb from the archives above
# and pushes it to github.com/zarakM/homebrew-tap, so users can:
#   brew install zarakM/tap/zanecli
# The push targets a DIFFERENT repo than this one, so the default GITHUB_TOKEN
# is not enough — a PAT with `repo` scope on the tap is supplied via the
# HOMEBREW_TAP_GITHUB_TOKEN secret (wired in .github/workflows/release.yml).
# No `test` stanza: zanecli has no flags and a bare launch opens the stdin
# wizard, which would hang `brew test`.
brews:
  - name: zanecli
    repository:
      owner: zarakM
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/zarakM/zanecli"
    description: "Conversational Kubernetes co-pilot in your terminal"
    license: "MIT"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    # Don't publish a formula for pre-release tags (v0.1.0-rc.1, etc.).
    skip_upload: auto
    install: |
      bin.install "zanecli"
    caveats: |
      zanecli needs an Anthropic API key (ANTHROPIC_API_KEY env var or the
      first-run wizard) and a kubeconfig (KUBECONFIG or ~/.kube/config).
      Start the co-pilot by running: zanecli

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  header: |
    ## zanecli {{ .Tag }}

    Install with:
    ```
    go install github.com/zarakM/zanecli@{{ .Tag }}
    ```

    Or download a pre-built binary below and add it to your `PATH`.
